<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الجباية الرقمية - شركة الساقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root { --bg-main: #f8f9fa; --sidebar-bg: #ffffff; --primary: #2b7a78; --text-dark: #2b2d42; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: var(--sidebar-bg); border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-brand { padding: 24px; font-size: 20px; font-weight: 700; text-align: center; color: var(--primary); border-bottom: 1px solid #eee; }
        .sidebar-menu { list-style: none; padding: 15px 0; overflow-y: auto; flex: 1; }
        .menu-item { padding: 12px 24px; display: flex; align-items: center; color: #555; text-decoration: none; cursor: pointer; transition: 0.2s; font-size: 14px; font-weight: 600; gap: 10px; }
        .menu-item:hover, .menu-item.active { background: #f0f7f6; color: var(--primary); }
        .menu-item.active { border-right: 4px solid var(--primary); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { background: #fff; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .container { padding: 25px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* تعديل بسيط جداً وآمن للهاتف */
        @media (max-width: 600px) {
            body { overflow-y: auto; }
            .sidebar { width: 100%; height: auto; }
            .main-content { height: auto; }
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-brand">منصة الجباية</div>
        <ul class="sidebar-menu">
            <li><a class="menu-item active" onclick="switchTab('main-dashboard', this)"><i class="fa-solid fa-table-columns"></i>الرئيسية</a></li>
            <li><a class="menu-item" onclick="switchTab('detailed-tx', this)"><i class="fa-solid fa-wave-square"></i>الحركات التفصيلية</a></li>
            <li><a class="menu-item" onclick="switchTab('performance-analysis', this)"><i class="fa-solid fa-chart-line"></i>تحليل الأداء</a></li>
            <li><a class="menu-item" onclick="switchTab('accounting-tab', this)"><i class="fa-solid fa-calculator"></i>التقرير المالي</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="header">
            <div id="pageHeaderTitle" style="font-weight: 700;">لوحة التحكم</div>
        </div>
        <div class="container">
            <div id="main-dashboard" class="tab-content active">
                <div class="section-card"><h2>مرحباً بك</h2><p>استخدم القائمة الجانبية للتنقل.</p></div>
            </div>
            <div id="detailed-tx" class="tab-content"><div class="section-card"><h2>الحركات التفصيلية</h2></div></div>
            <div id="performance-analysis" class="tab-content"><div class="section-card"><h2>تحليل الأداء</h2></div></div>
            <div id="accounting-tab" class="tab-content"><div class="section-card"><h2>التقرير المالي</h2></div></div>
        </div>
    </div>
    <script>
        function switchTab(tabId, element) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            element.classList.add('active');
            document.getElementById('pageHeaderTitle').innerText = element.innerText;
        }
    </script>
</body>
</html>
