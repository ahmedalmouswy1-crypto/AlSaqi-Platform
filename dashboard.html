<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الجباية الرقمية - شركة الساقي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        :root { --bg-main: #f8f9fa; --sidebar-bg: #ffffff; --primary: #2b7a78; --primary-dark: #17252a; --success: #2ec4b6; --danger: #e71d36; --card-bg: #ffffff; --text-dark: #2b2d42; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-dark); display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 280px; background-color: var(--sidebar-bg); border-left: 1px solid #e0e0e0; display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-brand { padding: 20px; font-size: 18px; font-weight: 700; text-align: center; color: var(--primary); border-bottom: 1px solid #eee; }
        .sidebar-menu { list-style: none; padding: 10px 0; overflow-y: auto; flex: 1; }
        .menu-item { padding: 12px 20px; display: flex; align-items: center; color: #555; text-decoration: none; cursor: pointer; transition: 0.2s; font-size: 13px; font-weight: 600; gap: 10px; }
        .menu-item:hover, .menu-item.active { background: #f0f7f6; color: var(--primary); }
        .menu-item.active { border-right: 4px solid var(--primary); }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .header { background: #fff; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .container { padding: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .kpi-card { background: var(--card-bg); padding: 15px; border-radius: 8px; border: 1px solid #eaeaea; }
        .section-card { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #eaeaea; margin-bottom: 20px; }
        .comp-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .comp-table th, .comp-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 12px; }
