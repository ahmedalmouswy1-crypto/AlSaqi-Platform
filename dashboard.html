<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الجباية الرقمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Cairo', sans-serif; display: flex; height: 100vh; background: #f8f9fa; }
        .sidebar { width: 280px; background: #fff; border-left: 1px solid #eee; flex-shrink: 0; }
        .sidebar-brand { padding: 20px; text-align: center; color: #2b7a78; font-weight: bold; font-size: 18px; border-bottom: 1px solid #eee; }
        .menu-item { padding: 15px 20px; color: #555; text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s; }
        .menu-item:hover, .menu-item.active { background: #f0f7f6; color: #2b7a78; border-right: 4px solid #2b7a78; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .card { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">منصة الجباية</div>
    <div class="menu">
        <a class="menu-item active" onclick="showSection('main', this)"><i class="fa-solid fa-table-columns"></i> الرئيسية</a>
        <a class="menu-item" onclick="showSection('tx-details', this)"><i class="fa-solid fa-wave-square"></i> الحركات التفصيلية</a>
        <a class="menu-item" onclick="showSection('finance', this)"><i class="fa-solid fa-calculator"></i> التقرير المالي والحسابات</a>
        <a class="menu-item" onclick="showSection('analysis', this)"><i class="fa-solid fa-chart-line"></i> تحليل الأداء</a>
    </div>
</div>

<div class="main-content">
    <div id="main" class="tab-content active"><div class="card"><h3>الرئيسية</h3><p>محتوى الرئيسية هنا...</p></div></div>
    <div id="tx-details" class="tab-content"><div class="card"><h3>الحركات التفصيلية</h3><p>بيانات الحركات هنا...</p></div></div>
    <div id="finance" class="tab-content"><div class="card"><h3>التقرير المالي</h3><p>بيانات التقرير المالي هنا...</p></div></div>
    <div id="analysis" class="tab-content"><div class="card"><h3>تحليل الأداء</h3><p>بيانات التحليل هنا...</p></div></div>
</div>

<script>
    function showSection(sectionId, element) {
        // إخفاء كل الأقسام
        document.querySelectorAll('.tab-content').forEach(s => s.classList.remove('active'));
        // إزالة التفعيل من القائمة
        document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
        
        // إظهار القسم المطلوب
        document.getElementById(sectionId).classList.add('active');
        // تفعيل الرابط الذي تم الضغط عليه
        element.classList.add('active');
    }
</script>
</body>
</html>
