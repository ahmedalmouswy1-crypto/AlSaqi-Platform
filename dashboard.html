<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الجباية - التقرير المالي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Cairo', sans-serif; display: flex; height: 100vh; background: #f8f9fa; }
        .sidebar { width: 280px; background: #fff; border-left: 1px solid #eee; flex-shrink: 0; }
        .sidebar-brand { padding: 20px; text-align: center; color: #2b7a78; font-weight: bold; font-size: 18px; border-bottom: 1px solid #eee; }
        .menu-item { padding: 15px 20px; color: #555; text-decoration: none; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .menu-item.active { background: #f0f7f6; color: #2b7a78; border-right: 4px solid #2b7a78; }
        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .table-wrapper { background: #fff; padding: 20px; border-radius: 8px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 13px; }
        th { background: #f9f9f9; font-weight: bold; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand"><i class="fa-solid fa-satellite-dish"></i> منصة الجباية</div>
    <div class="menu">
        <a class="menu-item"><i class="fa-solid fa-table-columns"></i> الرئيسية</a>
        <a class="menu-item"><i class="fa-solid fa-wave-square"></i> الحركات التفصيلية</a>
        <a class="menu-item"><i class="fa-solid fa-calculator"></i> التقرير المالي والحسابات</a>
        <a class="menu-item"><i class="fa-solid fa-scale-balanced"></i> التسويات</a>
    </div>
</div>

<div class="main-content">
    <h3>التقرير المالي والحسابات</h3>
    <div class="table-wrapper">
        <table id="financialTable">
            <thead>
                <tr>
                    <th>اسم الدائرة / المديرية</th>
                    <th>إجمالي المبالغ المجباة</th>
                    <th>عمولة الشركة الصافية (2%)</th>
                    <th>الاستقطاع الضريبي (5% من العمولة)</th>
                    <th>حالة مطابقة التدقيق والحسابات</th>
                    <th>صافي المبالغ الموردة للمصرف</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

</body>
</html>
